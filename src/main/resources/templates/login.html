<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login – Web Session</title>
</head>
<body>
<h2>Đăng nhập (Session)</h2>

<!-- Spring Security tự đọc ?error và ?logout từ URL -->
<div th:if="${param.error}" style="color:red">
    Sai username hoặc password!
</div>
<div th:if="${param.logout}" style="color:green">
    Đã đăng xuất thành công.
</div>

<!--
    action="/web/login" method="post" → Spring Security tự bắt POST này
    KHÔNG cần viết controller xử lý POST /web/login
    Spring Security đọc field name="username" và name="password"
-->
<form th:action="@{/web/login}" method="post">
    <!-- th:action tự thêm CSRF token vào hidden field -->
    <input type="text"     name="username" placeholder="Username" required/><br/><br/>
    <input type="password" name="password" placeholder="Password" required/><br/><br/>
    <button type="submit">Đăng nhập</button>
</form>
</body>
</html>
